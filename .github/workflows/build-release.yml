name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quickshot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  QT_VERSION: 6.8.3

jobs:
  package:
    name: Package ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_suffix: linux-x86_64
            qt_arch: ""
            qt_archives: icu qtbase qtsvg
          - os: macos-15-intel
            artifact_suffix: macos-universal
            qt_arch: ""
            qt_archives: qtbase qtsvg
          - os: windows-2022
            artifact_suffix: windows-x86_64
            qt_arch: win64_msvc2022_64
            qt_archives: d3dcompiler_47 opengl32sw qtbase qtsvg

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt_arch }}
          archives: ${{ matrix.qt_archives }}
          cache: true

      - name: Configure Linux build
        if: runner.os == 'Linux'
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DQUICKSHOT_ENABLE_DEPLOYMENT=ON

      - name: Configure universal macOS build
        if: runner.os == 'macOS'
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DQUICKSHOT_ENABLE_DEPLOYMENT=ON
          '-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64'

      - name: Configure Windows build
        if: runner.os == 'Windows'
        run: >-
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DBUILD_TESTING=ON
          -DQUICKSHOT_ENABLE_DEPLOYMENT=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        run: cpack --config build/CPackConfig.cmake -C Release -B dist

      - name: Upload package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: QuickShot-${{ matrix.artifact_suffix }}
          path: dist/QuickShot-*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: QuickShot-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum QuickShot-* > SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/QuickShot-*
          dist/SHA256SUMS.txt
          --title "QuickShot ${{ github.ref_name }}"
          --generate-notes
